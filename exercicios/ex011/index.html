<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir sites em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagem/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagem/foto-m.png" type="image/png">
        <img src="imagem/foto-g.png" alt="Imagem Fliexivel">

    </picture>

    <h1>Reproduzindo Audio</h1>
    <p>Vamos aprender a reproduzir audios em HTML5.</p>
    <!-- <audio src="midia/the-theme.mp3" controls autoplay></audio> -->
     <audio preload="metadata" autoplay controls loop>
        <source src="midia/the-theme.mp3" type="audio/mpeg">
        <p>Infelizmente seu navegador nao consegue produzir audio <a href="midia/the-theme.mp3">Clique aqui para baixar o arquivo mp3</a></p>

     </audio>
</body>
</html>
