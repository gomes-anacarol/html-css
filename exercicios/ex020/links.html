<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;

        }

        a{
            color: red;
            text-decoration: none;
            font-weight: bold;

        }

        a:visited{
            color: darkred;

        }

        a:hover{
            color: black;
            text-decoration: underline;

        }

        a:active{
            color: yellow;

        }

        .especial{
            background-color: rgb(238, 154, 154);
            

        }
        .especial::before{
            content: '\2192  ';

        }

        .especial::after{
            content: ' \2190';

        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>

    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="external">Repositorio GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" class="especial"target="_blank" rel="external">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" class="especial" target="_blank" rel="external">Site do CursoEmVideo</a></li>

    </ul>

</body>
</html>
